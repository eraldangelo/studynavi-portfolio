version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: "Asia/Manila"
    # Portfolio mode: disable automated dependency PR branches.
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - automated
    commit-message:
      prefix: "deps"
    groups:
      next-stack:
        patterns:
          - "next"
          - "react*"
          - "@types/react*"
      firebase-stack:
        patterns:
          - "firebase*"
      lint-stack:
        patterns:
          - "eslint*"
          - "@typescript-eslint/*"
      test-stack:
        patterns:
          - "@playwright/test"
          - "ts-prune"
          - "tsx"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "03:30"
      timezone: "Asia/Manila"
    # Portfolio mode: disable automated CI dependency PR branches.
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - ci
      - automated
    commit-message:
      prefix: "ci"
