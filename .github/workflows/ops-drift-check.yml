name: Ops Drift Check

on:
  schedule:
    - cron: '45 2 * * *'
  workflow_dispatch:
    inputs:
      drift_mode:
        description: "Drift check mode"
        type: choice
        required: false
        default: auto
        options:
          - auto
          - repo
          - cloud
      require_cloud_checks:
        description: "Fail if cloud-state checks cannot run"
        type: boolean
        required: false
        default: false

jobs:
  ops-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    concurrency:
      group: ops-drift-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate cloud auth requirements
        if: >
          github.event_name == 'schedule'
          || github.event.inputs.drift_mode == 'cloud'
          || github.event.inputs.require_cloud_checks == 'true'
        env:
          GCP_SA_KEY_JSON: ${{ secrets.GCP_SA_KEY_JSON }}
        run: |
          if [ -z "$GCP_SA_KEY_JSON" ]; then
            echo "GCP_SA_KEY_JSON is required for cloud-state drift checks."
            exit 1
          fi

      - name: Authenticate GCP (optional)
        if: ${{ secrets.GCP_SA_KEY_JSON != '' }}
        env:
          GCP_SA_KEY_JSON: ${{ secrets.GCP_SA_KEY_JSON }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT || secrets.FIREBASE_PROJECT || 'your-gcp-project-id' }}
        run: |
          SA_PATH="$RUNNER_TEMP/gcp-sa.json"
          printf '%s' "$GCP_SA_KEY_JSON" > "$SA_PATH"
          gcloud auth activate-service-account --key-file="$SA_PATH"
          gcloud config set project "$GOOGLE_CLOUD_PROJECT"

      - name: Run ops drift checks
        env:
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT || secrets.FIREBASE_PROJECT || 'your-gcp-project-id' }}
          OPS_DRIFT_MODE: ${{ github.event_name == 'schedule' && 'cloud' || github.event.inputs.drift_mode || 'auto' }}
          OPS_DRIFT_REQUIRE_CLOUD: ${{ github.event_name == 'schedule' && 'true' || github.event.inputs.require_cloud_checks == 'true' && 'true' || 'false' }}
        run: npm run ops:check:drift

