name: Stale Issues and PRs

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Mark stale items
        uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639
        with:
          stale-issue-message: >
            This issue has been marked stale due to no activity.
            Add an update or comment to keep it open.
          close-issue-message: >
            Closing this issue because it has been stale with no follow-up.
            Reopen if the problem persists.
          stale-pr-message: >
            This pull request is stale due to no activity.
            Push updates or comment to keep it active.
          close-pr-message: >
            Closing this pull request because it has been stale with no follow-up.
          stale-issue-label: stale
          stale-pr-label: stale
          days-before-stale: 21
          days-before-close: 7
          exempt-issue-labels: "security,country-logic"
          exempt-pr-labels: "dependencies"
          operations-per-run: 100
