name: Promote To Production

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: "Git ref to promote (main or release-* branch)"
        required: true
        default: "main"
      deploy_confirmation:
        description: "Type PROMOTE_STAGING_TO_PROD to continue"
        required: true
        default: ""

jobs:
  verify-release-ref:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.inputs.release_ref }}

      - name: Validate release ref naming
        run: |
          REF="${{ github.event.inputs.release_ref }}"
          if [ "$REF" = "main" ]; then
            exit 0
          fi
          case "$REF" in
            release-*)
              exit 0
              ;;
            *)
              echo "release_ref must be main or release-*"
              exit 1
              ;;
          esac

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Run verify gate
        run: npm run verify

      - name: Run semantic rules gate
        run: npm run test:rules

      - name: Run Pathfinder contract gate
        run: npm run test:contract:pathfinder

      - name: Validate cloud drift credentials
        env:
          GCP_SA_KEY_JSON: ${{ secrets.GCP_SA_KEY_JSON }}
        run: |
          if [ -z "$GCP_SA_KEY_JSON" ]; then
            echo "GCP_SA_KEY_JSON is required for enforceable cloud-state drift checks."
            exit 1
          fi

      - name: Authenticate GCP for cloud drift checks
        env:
          GCP_SA_KEY_JSON: ${{ secrets.GCP_SA_KEY_JSON }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT || secrets.FIREBASE_PROJECT || 'your-firebase-project-id' }}
        run: |
          SA_PATH="$RUNNER_TEMP/gcp-sa.json"
          printf '%s' "$GCP_SA_KEY_JSON" > "$SA_PATH"
          gcloud auth activate-service-account --key-file="$SA_PATH"
          gcloud config set project "$GOOGLE_CLOUD_PROJECT"

      - name: Run enforceable cloud drift gate
        env:
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT || secrets.FIREBASE_PROJECT || 'your-firebase-project-id' }}
        run: npm run ops:check:drift:cloud

      - name: Validate claims cutover cloud credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT_JSON is required for claims-cutover cloud checks."
            exit 1
          fi

      - name: Run claims cutover cloud gate
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: npm run check:claims-cutover:cloud

  promote:
    needs: verify-release-ref
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    environment:
      name: production
      url: https://your-app.example.com/
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Validate confirmation phrase
        run: |
          if [ "${{ github.event.inputs.deploy_confirmation }}" != "PROMOTE_STAGING_TO_PROD" ]; then
            echo "Manual promotion confirmation mismatch."
            exit 1
          fi

      - name: Trigger production rollout
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_PROJECT: ${{ secrets.FIREBASE_PROJECT || 'your-firebase-project-id' }}
          FIREBASE_APP_HOSTING_BACKEND: ${{ secrets.FIREBASE_APP_HOSTING_BACKEND || 'studio' }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          RELEASE_REF: ${{ github.event.inputs.release_ref }}
        run: |
          AUTH_ARGS=()
          if [ -n "$FIREBASE_TOKEN" ]; then
            AUTH_ARGS=(--token "$FIREBASE_TOKEN")
          elif [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            SA_PATH="$RUNNER_TEMP/firebase-service-account.json"
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$SA_PATH"
            export GOOGLE_APPLICATION_CREDENTIALS="$SA_PATH"
          else
            echo "Missing rollout auth secret (FIREBASE_TOKEN or FIREBASE_SERVICE_ACCOUNT_JSON)."
            exit 1
          fi

          npx firebase-tools@15.5.1 apphosting:rollouts:create "$FIREBASE_APP_HOSTING_BACKEND" \
            -b "$RELEASE_REF" \
            -f \
            --project "$FIREBASE_PROJECT" \
            "${AUTH_ARGS[@]}" \
            --non-interactive

